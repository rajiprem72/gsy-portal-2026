<!DOCTYPE html>
<html>
<head>
    <script>
        const host = window.location.hostname.toLowerCase();

        switch (host) {
            case "dlyc.globalschoolofyoga.com":
                window.location.replace("/district-index.html");
                break;

            case "slyc.globalschoolofyoga.com":
                window.location.replace("/state-index.html");
                break;

            case "nlyc.globalschoolofyoga.com":
                window.location.replace("/national-index.html");
                break;

            case "inlyc.globalschoolofyoga.com":
                window.location.replace("/international-index.html");
                break;

            default:
                window.location.replace("/district-index.html");
        }
    </script>
</head>
<body>
</body>
</html>
